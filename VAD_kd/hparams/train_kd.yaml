# ##################################################################################################
# Knowledge Distillation: train a smaller CRDNN student from the trained CRDNN teacher.
#
# Teacher:  CNN(16,32) + biGRU(hidden=32,layers=2) + DNN(16,16) -> 1
# Student:  CNN( 8,16) + biGRU(hidden=16,layers=2) + DNN( 8   ) -> 1
#
# Loss: alpha * MSE(sigmoid(student), sigmoid(teacher)) + (1-alpha) * BCE(student, ground_truth)
# ##################################################################################################

seed: 1986
__set_seed: !apply:speechbrain.utils.seed_everything [!ref <seed>]
output_folder: !ref results/VAD_CRDNN_KD/<seed>
save_folder:   !ref <output_folder>/save
train_log:     !ref <output_folder>/train_log.txt

# ── Paths ──────────────────────────────────────────────────────────────────────
data_folder:           !PLACEHOLDER   # /path/to/LibriParty
musan_folder:          !PLACEHOLDER   # /path/to/musan
commonlanguage_folder: !PLACEHOLDER   # /path/to/common_voice_kpd

# Teacher checkpoint (frozen)
teacher_ckpt_dir: !PLACEHOLDER   # e.g. /path/to/train_results/VAD_CRDNN/1986/save/CKPT+epoch_85

# Openrir noise (reuse existing csv if already prepared)
data_folder_noise:  !ref <data_folder>/noise
NOISE_DATASET_URL:  https://www.dropbox.com/scl/fi/a09pj97s5ifan81dqhi4n/noises.zip?rlkey=j8b0n9kdjdr32o1f06t0cw5b7&dl=1
noise_csv_openrir:  !ref <save_folder>/noise_openrir.csv

# Manifest files (reuse from teacher run or regenerate)
annotation_train:     !ref <save_folder>/train.json
annotation_valid:     !ref <save_folder>/valid.json
annotation_test:      !ref <save_folder>/test.json
music_csv:            !ref <save_folder>/music.csv
noise_csv:            !ref <save_folder>/noise.csv
speech_csv:           !ref <save_folder>/speech.csv
multilang_speech_csv: !ref <save_folder>/multilang_speech.csv
skip_prep: False

# ── Training parameters ────────────────────────────────────────────────────────
N_epochs:       100
lr:             1.0
lr_final:       0.1
batch_size:     16
example_length: 5        # seconds
sample_rate:    16000
time_resolution: 0.01   # seconds

num_workers: 4
train_dataloader_opts:
    batch_size: !ref <batch_size>
    num_workers: !ref <num_workers>
valid_dataloader_opts:
    batch_size: !ref <batch_size>
    num_workers: !ref <num_workers>
test_dataloader_opts:
    batch_size: !ref <batch_size>
    num_workers: !ref <num_workers>

# ── KD hyperparameters ─────────────────────────────────────────────────────────
kd_alpha:       0.7   # weight for KD loss  (1-alpha goes to BCE)
kd_temperature: 2.0   # temperature for softening teacher/student logits

# ── Feature parameters ─────────────────────────────────────────────────────────
n_fft:   400
n_mels:  40

# ── Data augmentation ─────────────────────────────────────────────────────────
prepare_noise_data: !name:speechbrain.augment.preparation.prepare_dataset_from_URL
    URL: !ref <NOISE_DATASET_URL>
    dest_folder: !ref <data_folder_noise>
    ext: wav
    csv_file: !ref <noise_csv_openrir>

add_noise: !new:speechbrain.augment.time_domain.AddNoise
    csv_file: !ref <noise_csv_openrir>
    snr_low: -5
    snr_high: 15
    noise_sample_rate: 16000
    clean_sample_rate:  16000
    num_workers: !ref <num_workers>

add_noise_musan: !new:speechbrain.augment.time_domain.AddNoise
    csv_file: !ref <noise_csv>
    snr_low: -5
    snr_high: 15
    noise_sample_rate: 16000
    clean_sample_rate:  16000
    num_workers: !ref <num_workers>

add_music_musan: !new:speechbrain.augment.time_domain.AddNoise
    csv_file: !ref <music_csv>
    snr_low: -5
    snr_high: 15
    noise_sample_rate: 16000
    clean_sample_rate:  16000
    num_workers: !ref <num_workers>

add_speech_musan: !new:speechbrain.augment.time_domain.AddNoise
    csv_file: !ref <speech_csv>
    snr_low: -5
    snr_high: 15
    noise_sample_rate: 16000
    clean_sample_rate:  16000
    num_workers: !ref <num_workers>

# ── Feature extractor + normalizer (shared by teacher and student) ─────────────
compute_features: !new:speechbrain.lobes.features.Fbank
    sample_rate: !ref <sample_rate>
    n_fft:       !ref <n_fft>
    n_mels:      !ref <n_mels>
    hop_length:  !ref <time_resolution> * 1000   # ms

mean_var_norm: !new:speechbrain.processing.features.InputNormalization
    norm_type: sentence

# ── Teacher model (same architecture as original, weights loaded in train_kd.py) ─
teacher_cnn: !new:speechbrain.nnet.containers.Sequential
    input_shape: [null, null, 40]
    norm1: !name:speechbrain.nnet.normalization.LayerNorm
    cnn1:  !name:speechbrain.lobes.models.CRDNN.CNN_Block
        channels: 16
        kernel_size: (3, 3)
    cnn2:  !name:speechbrain.lobes.models.CRDNN.CNN_Block
        channels: 32
        kernel_size: (3, 3)

teacher_rnn: !new:speechbrain.nnet.RNN.GRU
    input_shape: [null, null, 320]
    hidden_size: 32
    num_layers:  2
    bidirectional: True

teacher_dnn: !new:speechbrain.nnet.containers.Sequential
    input_shape: [null, null, 64]
    dnn1: !name:speechbrain.lobes.models.CRDNN.DNN_Block
        neurons: 16
    dnn2: !name:speechbrain.lobes.models.CRDNN.DNN_Block
        neurons: 16
    lin:  !name:speechbrain.nnet.linear.Linear
        n_neurons: 1
        bias: False

teacher_model: !new:torch.nn.ModuleList
    - [!ref <teacher_cnn>, !ref <teacher_rnn>, !ref <teacher_dnn>]

# ── Student model (thinner CRDNN) ──────────────────────────────────────────────
# CNN:  8ch -> 16ch  =>  after 2× freq-pool-2: 16 * (40/4) = 16 * 10 = 160-dim
# RNN:  biGRU hidden=16, 2 layers  =>  output 16*2 = 32-dim
# DNN:  one DNN_Block(8) -> Linear(1)

student_cnn: !new:speechbrain.nnet.containers.Sequential
    input_shape: [null, null, 40]
    norm1: !name:speechbrain.nnet.normalization.LayerNorm
    cnn1:  !name:speechbrain.lobes.models.CRDNN.CNN_Block
        channels: 8
        kernel_size: (3, 3)
    cnn2:  !name:speechbrain.lobes.models.CRDNN.CNN_Block
        channels: 16
        kernel_size: (3, 3)

student_rnn: !new:speechbrain.nnet.RNN.GRU
    input_shape: [null, null, 160]
    hidden_size: 16
    num_layers:  2
    bidirectional: True

student_dnn: !new:speechbrain.nnet.containers.Sequential
    input_shape: [null, null, 32]
    dnn1: !name:speechbrain.lobes.models.CRDNN.DNN_Block
        neurons: 8
    lin:  !name:speechbrain.nnet.linear.Linear
        n_neurons: 1
        bias: False

student_model: !new:torch.nn.ModuleList
    - [!ref <student_cnn>, !ref <student_rnn>, !ref <student_dnn>]

modules:
    student_model:  !ref <student_model>
    student_cnn:    !ref <student_cnn>
    student_rnn:    !ref <student_rnn>
    student_dnn:    !ref <student_dnn>
    mean_var_norm:  !ref <mean_var_norm>

# ── Optimizer & scheduler (for student only) ───────────────────────────────────
opt_class: !name:torch.optim.Adadelta
    lr:  !ref <lr>
    rho: 0.95
    eps: 1.e-8

epoch_counter: !new:speechbrain.utils.epoch_loop.EpochCounter
    limit: !ref <N_epochs>

lr_annealing: !new:speechbrain.nnet.schedulers.LinearScheduler
    initial_value: !ref <lr>
    final_value:   !ref <lr_final>
    epoch_count:   !ref <N_epochs>

checkpointer: !new:speechbrain.utils.checkpoints.Checkpointer
    checkpoints_dir: !ref <save_folder>
    recoverables:
        model:      !ref <student_model>
        normalizer: !ref <mean_var_norm>
        counter:    !ref <epoch_counter>

# ── Losses & logging ───────────────────────────────────────────────────────────
compute_BCE_cost: !name:speechbrain.nnet.losses.bce_loss

train_logger: !new:speechbrain.utils.train_logger.FileTrainLogger
    save_file: !ref <train_log>

train_stats: !name:speechbrain.utils.metric_stats.BinaryMetricStats
test_stats:  !name:speechbrain.utils.metric_stats.BinaryMetricStats
